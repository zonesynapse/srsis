<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Road Risk Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://polyfill.io/v3/polyfill.min.js?features=default"></script>
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="brand">
                <h1>Safe<span>Route</span></h1>
                <p>Geometric Risk Intelligence</p>
            </div>

            <div class="search-panel">
                <div class="input-group">
                    <label>Source</label>
                    <input type="text" id="source" placeholder="Enter starting point">
                </div>
                <div class="input-group">
                    <label>Destination</label>
                    <input type="text" id="destination" placeholder="Enter destination">
                </div>

                <button id="find-route-btn" class="primary-btn">Analyze Route</button>
            </div>

            <div id="route-stats" class="stats-panel hidden">
                <div class="stat-card safe-choice">
                    <h3>Safest Route</h3>
                    <div class="details">
                        <span id="safe-time">-- min</span>
                        <span id="safe-risk">Low Risk</span>
                    </div>
                </div>
                <div class="stat-card fast-choice">
                    <h3>Fastest Route</h3>
                    <div class="details">
                        <span id="fast-time">-- min</span>
                        <span id="fast-risk">High Risk</span>
                    </div>
                </div>
                <!-- Action Buttons -->
                <div id="action-buttons" style="display: none; flex-direction: column; gap: 10px; margin-top: 1rem;">
                    <button id="start-simulation-btn" class="primary-btn" style="background-color: var(--success);">Start Simulation</button>
                    <button id="download-report-btn" class="primary-btn" style="background-color: var(--warning); color: #000;">Download Risk Report</button>
                </div>
            </div>
        </aside>

        <!-- Map Container -->
        <main class="map-wrapper">
            <div id="map"></div>
            <!-- Alert Overlay -->
            <div id="risk-alert" class="alert-box hidden">
                <div class="alert-icon">⚠️</div>
                <div class="alert-content">
                    <h4>High Risk Zone Ahead</h4>
                    <p>Sharp curve approaching in 1km. Reduce speed.</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Leaflet JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script src="{{ url_for('static', filename='js/alert_system.js') }}?v=1.1"></script>
    <script src="{{ url_for('static', filename='js/map_core.js') }}?v=1.1"></script>
</body>

</html>
