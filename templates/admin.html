<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - SafeRoute</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="admin-container">
        <header class="admin-header">
            <h1>SafeRoute Admin</h1>
            <nav>
                <a href="/">Back to Map</a>
            </nav>
        </header>

        <main class="dashboard-grid">
            <div class="card">
                <h2>Regional Risk Map</h2>
                <div id="admin-map" style="height: 300px; background: #222;"></div>
            </div>

            <div class="card">
                <h2>Top High-Risk Segments</h2>
                <ul id="risk-list">
                    <li>Loading...</li>
                </ul>
            </div>

            <div class="card">
                <h2>Risk Weight Adjustment</h2>
                <div class="control-group">
                    <label>Curve Severity Weight</label>
                    <input type="range" min="0" max="1" step="0.1" value="0.7">
                </div>
                <div class="control-group">
                    <label>Weather Weight</label>
                    <input type="range" min="0" max="1" step="0.1" value="0.3">
                </div>
                <button class="secondary-btn">Update Model</button>
            </div>
        </main>
    </div>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=default"></script>
    <!-- Leaflet JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script src="{{ url_for('static', filename='js/admin_dashboard.js') }}"></script>
</body>

</html>
